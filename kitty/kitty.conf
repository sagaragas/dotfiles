# ─── Font ───────────────────────────────────────────────────────────────
font_family      FiraCode Nerd Font Mono
font_size        13.0


# ─── Window Layout ──────────────────────────────────────────────────────
window_margin_width        10
window_padding_width       20
window_border_width        1pt
active_border_color        #89b4fa
inactive_border_color      #45475a
single_window_margin_width 0

background_opacity         0.65
background_blur            20

enabled_layouts Tall, *

# ─── Cursor ─────────────────────────────────────────────────────────────
cursor_shape               beam
cursor_blink_interval      0.5
cursor_stop_blinking_after 15.0

# ─── Scrollback ─────────────────────────────────────────────────────────
scrollback_lines 10000

# ─── Mouse / URLs ───────────────────────────────────────────────────────
copy_on_select         clipboard
strip_trailing_spaces  smart
detect_urls            yes
url_style              curly

# ─── Bell ───────────────────────────────────────────────────────────────
enable_audio_bell    no
visual_bell_duration 0

# ─── macOS ──────────────────────────────────────────────────────────────
macos_option_as_alt       yes
macos_quit_when_last_window_closed no
confirm_os_window_close   -1

# ─── Tab Bar ────────────────────────────────────────────────────────────
tab_bar_edge top
tab_bar_style custom
tab_bar_min_tabs 1
tab_title_template "{bell_symbol}{activity_symbol}{index}: {title} [{cwd[-1]}]"
active_tab_font_style bold
inactive_tab_font_style normal

map cmd+t       new_tab_with_cwd
map cmd+w       close_window
map cmd+1       goto_tab 1
map cmd+2       goto_tab 2
map cmd+3       goto_tab 3
map cmd+4       goto_tab 4
map cmd+5       goto_tab 5
map cmd+6       goto_tab 6
map cmd+7       goto_tab 7
map cmd+8       goto_tab 8
map cmd+9       goto_tab 9
map cmd+shift+] next_tab
map cmd+shift+[ previous_tab
map cmd+shift+right move_tab_forward
map cmd+shift+left  move_tab_backward

# ─── Splits ─────────────────────────────────────────────────────────────
map cmd+d       launch --cwd=current --location=hsplit
map cmd+shift+d launch --cwd=current --location=vsplit

# ─── Keybindings ────────────────────────────────────────────────────────
map f1 new_window_with_cwd
map f2 launch --cwd=current $EDITOR .

# ─── Shell Integration ─────────────────────────────────────────────────
shell_integration enabled
allow_hyperlinks yes
