# ─── Font ───────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0
disable_ligatures always
symbol_map U+23FB-U+23FE,U+2665,U+26A1,U+2B58,U+E000-U+E00A,U+E0A0-U+E0A3,U+E0B0-U+E0D4,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6AA,U+E700-U+E7C5,U+EA60-U+EBEB,U+F000-U+F2E0,U+F300-U+F32F,U+F400-U+F4A9,U+F500-U+F8FF,U+F0001-U+F1AF0 Symbols Nerd Font Mono
text_composition_strategy legacy


# ─── Window Layout ──────────────────────────────────────────────────────
window_margin_width        10
window_padding_width       15
window_border_width        2pt
active_border_color        #89b4fa
inactive_border_color      #45475a
single_window_margin_width 0

background_opacity         0.95
background_blur            20

enabled_layouts Tall, *

# ─── Cursor ─────────────────────────────────────────────────────────────
cursor_shape               beam
cursor_blink_interval      0.5
cursor_stop_blinking_after 0

# ─── Scrollback ─────────────────────────────────────────────────────────
scrollback_lines 10000

# ─── Mouse / URLs ───────────────────────────────────────────────────────
copy_on_select         clipboard
strip_trailing_spaces  smart

# ─── Bell ───────────────────────────────────────────────────────────────
enable_audio_bell    no
visual_bell_duration 0
bell_on_tab          yes

# ─── Misc ───────────────────────────────────────────────────────────────
confirm_os_window_close   0
detect_urls               yes
url_style                 curly
notify_on_cmd_finish      invisible 10.0 notify
term                      xterm-256color

# ─── macOS ──────────────────────────────────────────────────────────────
macos_option_as_alt       yes
macos_quit_when_last_window_closed no

# ─── Tab Bar ────────────────────────────────────────────────────────────
tab_bar_edge top
tab_bar_style separator
tab_bar_margin_width 3.0
tab_bar_min_tabs 2
tab_separator ""
tab_activity_symbol *
tab_title_template "{fmt.fg._ffb86c}{fmt.bg.default}{fmt.fg.black}{fmt.bg._ffb86c}   {fmt.fg.red}{activity_symbol}{fmt.fg.black}{index}: {title}{' [{}]'.format(num_windows) if num_windows > 1 else ''}   {fmt.fg._ffb86c}{fmt.bg.default} "
active_tab_title_template "{fmt.fg._ffb86c}{fmt.bg.default}{fmt.fg.black}{fmt.bg._ffb86c}   {fmt.fg.red}{activity_symbol}{fmt.fg.black}{index}: {title}{' [{}]'.format(num_windows) if num_windows > 1 else ''}   {fmt.fg._ffb86c}{fmt.bg.default} "

active_tab_font_style bold
inactive_tab_font_style normal

map cmd+t       new_tab_with_cwd
map cmd+w       close_window
map cmd+1       goto_tab 1
map cmd+2       goto_tab 2
map cmd+3       goto_tab 3
map cmd+4       goto_tab 4
map cmd+5       goto_tab 5
map cmd+6       goto_tab 6
map cmd+7       goto_tab 7
map cmd+8       goto_tab 8
map cmd+9       goto_tab 9
map cmd+shift+] next_tab
map cmd+shift+[ previous_tab
map cmd+shift+right move_tab_forward
map cmd+shift+left  move_tab_backward

# ─── Splits ─────────────────────────────────────────────────────────────
map cmd+d       launch --cwd=current --location=hsplit
map cmd+shift+d launch --cwd=current --location=vsplit

# ─── Keybindings ────────────────────────────────────────────────────────
map f1 new_window_with_cwd
map f2 launch --cwd=current $EDITOR .

# ─── Shell Integration ─────────────────────────────────────────────────
shell_integration enabled
allow_hyperlinks yes
