# ─── Font ───────────────────────────────────────────────────────────────
font_family      FiraCode Nerd Font Mono
font_size        14.0

# ─── Catppuccin Mocha Color Scheme ──────────────────────────────────────
foreground #cdd6f4
background #1e1e2e
selection_foreground #1e1e2e
selection_background #f5e0dc
cursor #f5e0dc
cursor_text_color #1e1e2e
url_color #89b4fa

# black
color0  #45475a
color8  #585b70

# red
color1  #f38ba8
color9  #f38ba8

# green
color2  #a6e3a1
color10 #a6e3a1

# yellow
color3  #f9e2af
color11 #f9e2af

# blue
color4  #89b4fa
color12 #89b4fa

# magenta
color5  #f5c2e7
color13 #f5c2e7

# cyan
color6  #94e2d5
color14 #94e2d5

# white
color7  #bac2de
color15 #a6adc8

mark1_foreground #1e1e2e
mark1_background #89b4fa
mark2_foreground #1e1e2e
mark2_background #cba6f7
mark3_foreground #1e1e2e
mark3_background #74c7ec

# ─── Window Layout ──────────────────────────────────────────────────────
window_margin_width        10
window_padding_width       20
window_border_width        1pt
active_border_color        #89b4fa
inactive_border_color      #45475a
single_window_margin_width 0

background_opacity         0.95
background_blur            20

enabled_layouts Tall, *

# ─── Cursor ─────────────────────────────────────────────────────────────
cursor_shape               beam
cursor_blink_interval      0.5
cursor_stop_blinking_after 15.0

# ─── Scrollback ─────────────────────────────────────────────────────────
scrollback_lines 10000

# ─── Mouse / URLs ───────────────────────────────────────────────────────
copy_on_select         clipboard
strip_trailing_spaces  smart
detect_urls            yes
url_style              curly

# ─── Bell ───────────────────────────────────────────────────────────────
enable_audio_bell    no
visual_bell_duration 0

# ─── macOS ──────────────────────────────────────────────────────────────
macos_option_as_alt       yes
macos_quit_when_last_window_closed no
confirm_os_window_close   -1

# ─── Tab Bar ────────────────────────────────────────────────────────────
tab_bar_edge top
tab_bar_style custom
tab_bar_min_tabs 1
tab_title_template "{bell_symbol}{activity_symbol}{index}: {title} [{cwd[-1]}]"
active_tab_font_style bold
inactive_tab_font_style normal

map cmd+t       new_tab_with_cwd
map cmd+w       close_window
map cmd+1       goto_tab 1
map cmd+2       goto_tab 2
map cmd+3       goto_tab 3
map cmd+4       goto_tab 4
map cmd+5       goto_tab 5
map cmd+6       goto_tab 6
map cmd+7       goto_tab 7
map cmd+8       goto_tab 8
map cmd+9       goto_tab 9
map cmd+shift+] next_tab
map cmd+shift+[ previous_tab

# ─── Splits ─────────────────────────────────────────────────────────────
map cmd+d       launch --cwd=current --location=hsplit
map cmd+shift+d launch --cwd=current --location=vsplit

# ─── Keybindings ────────────────────────────────────────────────────────
map f1 new_window_with_cwd
map f2 launch --cwd=current $EDITOR .

# ─── Shell Integration ─────────────────────────────────────────────────
shell_integration enabled
allow_hyperlinks yes
